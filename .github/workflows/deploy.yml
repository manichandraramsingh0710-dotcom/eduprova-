name: EduProva CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # -----------------------
      # Docker Login
      # -----------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------
      # Build Backend Image
      # -----------------------
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eduprova-backend:latest ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/eduprova-backend:latest

      # -----------------------
      # Build Frontend Image
      # -----------------------
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eduprova-frontend:latest ./eduprova-workupdates

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/eduprova-frontend:latest

      # -----------------------
      # Deploy to EC2
      # -----------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/eduprova
            docker pull ${{ secrets.DOCKER_USERNAME }}/eduprova-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/eduprova-frontend:latest
            docker compose down
            docker compose up -d
