version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: eduprova-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduprova-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./eduprova-workupdates
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:8000
    container_name: eduprova-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
